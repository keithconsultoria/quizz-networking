<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulario de Contacto</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #fdf6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(180, 80, 120, 0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
    }

    h2 {
      color: #b45278;
      font-size: 1.5rem;
      margin-bottom: 0.4rem;
      text-align: center;
    }

    p.subtitle {
      color: #888;
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 0.3rem;
      margin-top: 1rem;
    }

    input, textarea {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1.5px solid #e0c4d0;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #333;
      background: #fff8fb;
      transition: border 0.2s;
      font-family: inherit;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #b45278;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      margin-top: 1.8rem;
      width: 100%;
      padding: 0.85rem;
      background: #b45278;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #92375d; }
    button:disabled { background: #d4a0b5; cursor: not-allowed; }

    .mensaje {
      margin-top: 1.2rem;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }

    .mensaje.exito {
      background: #f0faf4;
      color: #2d7a4f;
      border: 1px solid #a8d5b8;
      display: block;
    }

    .mensaje.error {
      background: #fff0f3;
      color: #c0394b;
      border: 1px solid #f4b8c1;
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Contáctanos</h2>
    <p class="subtitle">Te respondemos a la brevedad</p>

    <label for="nombre">Nombre completo *</label>
    <input type="text" id="nombre" placeholder="Tu nombre completo" required />

    <label for="whatsapp">WhatsApp *</label>
    <input type="tel" id="whatsapp" placeholder="Ej. 2221234567" required />

    <label for="correo">Correo electrónico *</label>
    <input type="email" id="correo" placeholder="tu@correo.com" required />

    <label for="respuestas">Mensaje / Consulta *</label>
    <textarea id="respuestas" placeholder="Describe brevemente tu situación o consulta..."></textarea>

    <button id="btnEnviar" onclick="enviarFormulario()">Enviar</button>

    <div class="mensaje" id="mensaje"></div>
  </div>

  <script>
    const API_URL = "https://sheetdb.io/api/v1/dckht3p4v11xj";

    async function enviarFormulario() {
      const nombre     = document.getElementById("nombre").value.trim();
      const whatsapp   = document.getElementById("whatsapp").value.trim();
      const correo     = document.getElementById("correo").value.trim();
      const respuestas = document.getElementById("respuestas").value.trim();
      const btn        = document.getElementById("btnEnviar");
      const msg        = document.getElementById("mensaje");

      // Reset
      msg.className = "mensaje";
      msg.textContent = "";

      // Validación básica
      if (!nombre || !whatsapp || !correo || !respuestas) {
        msg.className = "mensaje error";
        msg.textContent = "Por favor completa todos los campos.";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Enviando...";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            data: {
              "Nombre completo": nombre,
              "Whatsapp":        whatsapp,
              "Correo electronico": correo,
              "Respuestas":      respuestas
            }
          })
        });

        if (res.ok) {
          msg.className = "mensaje exito";
          msg.textContent = "✓ Tu mensaje fue enviado correctamente. ¡Pronto te contactamos!";
          document.getElementById("nombre").value = "";
          document.getElementById("whatsapp").value = "";
          document.getElementById("correo").value = "";
          document.getElementById("respuestas").value = "";
        } else {
          throw new Error("Error en la respuesta del servidor");
        }
      } catch (err) {
        msg.className = "mensaje error";
        msg.textContent = "Ocurrió un error al enviar. Intenta de nuevo.";
      }

      btn.disabled = false;
      btn.textContent = "Enviar";
    }
  </script>
</body>
</html>
